name: "Terraform AgriCam DevSecOps Pipeline"

on:
  push:
    branches:
      - main
      - dev
      - staging
  pull_request:
    branches:
      - main

env:
  TF_VERSION: 1.7.5
  AWS_REGION: af-south-1

jobs:

# =====================================================
# JOB 1 - TERRAFORM FORMAT
# =====================================================
  terraform-format:
    name: Terraform Format Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

# =====================================================
# JOB 2 - TERRAFORM VALIDATE
# =====================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-format

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
        env:
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}

# =====================================================
# JOB 3 - TFLINT
# =====================================================
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    needs: terraform-validate

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint

# =====================================================
# JOB 4 - TFSEC
# =====================================================
  tfsec-security:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: terraform-lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: environnements/dev
          soft_fail: true

# =====================================================
# JOB 5 - CHECKOV
# =====================================================
  checkov-security:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    needs: tfsec-security

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: environnements/dev
          framework: terraform
          soft_fail: true

# =====================================================
# JOB 6 - TERRASCAN
# =====================================================
  terrascan-security:
    name: Terrascan Security Scan
    runs-on: ubuntu-latest
    needs: checkov-security

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Terrascan
        uses: tenable/terrascan-action@main
        with:
          iac_type: terraform
          iac_version: v14
          policy_type: aws
          only_warn: false

# =====================================================
# JOB 7 - TRIVY
# =====================================================
  trivy-security:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: terrascan-security

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: environnements/dev
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

# =====================================================
# JOB 8 - TERRAFORM PLAN
# =====================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: trivy-security

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1
          ami_id: ami-0826f7fac3eaaa32a

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: environnements/dev/tfplan

# =====================================================
# JOB 9 - TERRAFORM DEPLOY
# =====================================================
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: environnements/dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          ami_id: ami-0826f7fac3eaaa32a

      - name: Terraform Init
        run: terraform init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: environnements/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan